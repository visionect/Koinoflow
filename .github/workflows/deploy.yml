name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  PROJECT_ID: koinoflow-infra
  PROJECT_NUMBER: "557517254312"
  REGION: europe-west1
  ARTIFACT_REPOSITORY: koinoflow
  FRONTEND_BUCKET: gs://koinoflow-frontend
  BACKEND_SERVICE: koinoflow-backend
  MCP_SERVICE: koinoflow-mcp
  MIGRATION_JOB: koinoflow-migrate

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push backend image
        run: |
          set -euo pipefail
          image="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/backend:${GITHUB_SHA}"
          latest="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/backend:latest"

          docker build \
            --tag "${image}" \
            --tag "${latest}" \
            ./backend

          docker push "${image}"
          docker push "${latest}"

          echo "BACKEND_IMAGE=${image}" >> "${GITHUB_ENV}"

      - name: Build and push MCP image
        run: |
          set -euo pipefail
          image="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/mcp-server:${GITHUB_SHA}"
          latest="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/mcp-server:latest"

          docker build \
            --tag "${image}" \
            --tag "${latest}" \
            ./mcp-server

          docker push "${image}"
          docker push "${latest}"

          echo "MCP_IMAGE=${image}" >> "${GITHUB_ENV}"

      - name: Run database migrations
        run: |
          set -euo pipefail

          gcloud run jobs update "${MIGRATION_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${BACKEND_IMAGE}"

          gcloud run jobs execute "${MIGRATION_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --wait

      - name: Deploy Cloud Run services
        run: |
          set -euo pipefail

          gcloud run services update "${BACKEND_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${BACKEND_IMAGE}"

          gcloud run services update "${MCP_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${MCP_IMAGE}"

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_MCP_SERVER_URL: https://mcp.koinoflow.com
          VITE_PRICING_URL: ${{ vars.VITE_PRICING_URL }}
          VITE_SALES_CONTACT_URL: ${{ vars.VITE_SALES_CONTACT_URL }}
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Publish frontend bucket
        run: |
          set -euo pipefail
          gcloud storage rsync frontend/dist "${FRONTEND_BUCKET}" --recursive --delete-unmatched-destination-objects
