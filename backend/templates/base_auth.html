<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Koinoflow{% endblock %}</title>
    {% block head_extra %}{% endblock %}
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(0,0,0,.1), 0 4px 20px rgba(0,0,0,.06);
            max-width: 440px;
            width: 100%;
            padding: 2.5rem 2rem;
            animation: card-in .4s ease-out;
        }
        @keyframes card-in {
            from { opacity: 0; transform: translateY(8px) scale(.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0f172a;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: .5rem;
        }
        .description {
            font-size: .875rem;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        /* ── Buttons ─────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            width: 100%;
            padding: .625rem 1rem;
            border-radius: 8px;
            font-size: .875rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            background: #fff;
            color: #475569;
            text-decoration: none;
            transition: background .15s, border-color .15s;
        }
        .btn:hover { background: #f8fafc; border-color: #cbd5e1; }
        .btn-primary {
            background: #0f172a;
            color: #fff;
            border-color: #0f172a;
        }
        .btn-primary:hover { background: #1e293b; }
        .btn-danger {
            background: #fff;
            color: #dc2626;
            border-color: #fecaca;
        }
        .btn-danger:hover { background: #fef2f2; }
        .btn + .btn { margin-top: .75rem; }
        .btn-row {
            display: flex;
            gap: .75rem;
        }
        .btn-row .btn { margin-top: 0; }

        /* ── Forms ───────────────────────────────────────── */
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-size: .8rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: .375rem;
        }
        .form-group input {
            width: 100%;
            padding: .5rem .75rem;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-size: .875rem;
            color: #1e293b;
            background: #fff;
            transition: border-color .15s, box-shadow .15s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #94a3b8;
            box-shadow: 0 0 0 3px rgba(148,163,184,.15);
        }
        .form-errors {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: .75rem 1rem;
            margin-bottom: 1rem;
            font-size: .8rem;
            color: #dc2626;
            line-height: 1.5;
        }
        .form-errors ul { list-style: none; padding: 0; }
        .form-errors li + li { margin-top: .25rem; }

        /* ── Divider ─────────────────────────────────────── */
        .divider {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin: 1.25rem 0;
            font-size: .75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #f1f5f9;
        }

        /* ── Misc ────────────────────────────────────────── */
        .text-center { text-align: center; }
        .text-muted {
            font-size: .8rem;
            color: #94a3b8;
        }
        .text-muted a {
            color: #64748b;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .text-muted a:hover { color: #0f172a; }
        .hidden { display: none; }
        .mt-1 { margin-top: 1rem; }
        .mt-half { margin-top: .5rem; }

        /* ── Scopes list ─────────────────────────────────── */
        .scopes {
            background: #f1f5f9;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .scopes h2 {
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: #64748b;
            margin-bottom: .5rem;
        }
        .scopes ul { list-style: none; padding: 0; }
        .scopes li {
            font-size: .875rem;
            padding: .25rem 0;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .scopes li::before {
            content: "\2713";
            color: #22c55e;
            font-weight: 600;
        }

        /* ── Status icon ─────────────────────────────────── */
        .status-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status-icon svg {
            width: 32px;
            height: 32px;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .status-icon--success { background: #f0fdf4; }
        .status-icon--success svg { stroke: #22c55e; }
        .status-icon--error { background: #fef2f2; }
        .status-icon--error svg { stroke: #dc2626; }
        .status-icon--info { background: #eff6ff; }
        .status-icon--info svg { stroke: #3b82f6; }

        /* ── Animated checkmark ──────────────────────────── */
        .anim-circle { stroke-dasharray: 166; stroke-dashoffset: 166; animation: draw-stroke .5s .2s ease-out forwards; }
        .anim-check  { stroke-dasharray: 48;  stroke-dashoffset: 48;  animation: draw-stroke .3s .6s ease-out forwards; }
        .anim-x1, .anim-x2 { stroke-dasharray: 20; stroke-dashoffset: 20; }
        .anim-x1 { animation: draw-stroke .3s .5s ease-out forwards; }
        .anim-x2 { animation: draw-stroke .3s .65s ease-out forwards; }
        @keyframes draw-stroke { to { stroke-dashoffset: 0; } }

        /* ── Spinner ─────────────────────────────────────── */
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #e2e8f0;
            border-top-color: #94a3b8;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── OAuth provider buttons ──────────────────────── */
        .btn-provider svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="card {% block card_class %}{% endblock %}">
        <div class="logo">Koinoflow</div>
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
