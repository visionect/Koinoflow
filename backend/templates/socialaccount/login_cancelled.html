{% extends "base_auth.html" %}

{% block title %}Sign in cancelled — Koinoflow{% endblock %}

{% block content %}
    <div class="text-center">
        <div class="status-icon status-icon--error" style="margin-bottom:1.5rem;">
            <svg viewBox="0 0 52 52">
                <circle class="anim-circle" cx="26" cy="26" r="24" />
                <line class="anim-x1" x1="18" y1="18" x2="34" y2="34" />
                <line class="anim-x2" x1="34" y1="18" x2="18" y2="34" />
            </svg>
        </div>

        <h1>Sign in cancelled</h1>
        <p class="description">
            You cancelled the sign-in process. No changes were made to your account.
        </p>
    </div>

    <a href="{% url 'account_login' %}" class="btn btn-primary">Try again</a>
{% endblock %}
