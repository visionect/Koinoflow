<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server error — Koinoflow</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(0,0,0,.1), 0 4px 20px rgba(0,0,0,.06);
            max-width: 440px;
            width: 100%;
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .logo { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; color: #0f172a; margin-bottom: 1.5rem; }
        .icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; border-radius: 50%; background: #fef2f2; display: flex; align-items: center; justify-content: center; }
        .icon svg { width: 32px; height: 32px; stroke: #dc2626; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: .5rem; }
        p { font-size: .875rem; color: #64748b; line-height: 1.6; margin-bottom: 1.5rem; }
        a { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: .625rem 1rem; border-radius: 8px; font-size: .875rem; font-weight: 500; text-decoration: none; background: #0f172a; color: #fff; }
        a:hover { background: #1e293b; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Koinoflow</div>
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                <line x1="12" y1="9" x2="12" y2="13" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
        </div>
        <h1>Server error</h1>
        <p>Something unexpected happened. Our team has been notified. Please try again in a moment.</p>
        <a href="/">Go to dashboard</a>
    </div>
</body>
</html>
