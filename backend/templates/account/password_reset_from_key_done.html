{% extends "base_auth.html" %}

{% block title %}Password updated — Koinoflow{% endblock %}

{% block content %}
    <div class="text-center">
        <div class="status-icon status-icon--success" style="margin-bottom:1.5rem;">
            <svg viewBox="0 0 52 52">
                <circle class="anim-circle" cx="26" cy="26" r="24" />
                <path class="anim-check" d="M15 27l7 7 15-15" />
            </svg>
        </div>

        <h1>Password updated</h1>
        <p class="description">
            Your password has been successfully changed. You can now sign in with your new password.
        </p>
    </div>

    <a href="{% url 'account_login' %}" class="btn btn-primary">Sign in</a>
{% endblock %}
