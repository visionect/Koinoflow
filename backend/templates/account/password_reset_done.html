{% extends "base_auth.html" %}

{% block title %}Email sent — Koinoflow{% endblock %}

{% block content %}
    <div class="text-center">
        <div class="status-icon status-icon--success" style="margin-bottom:1.5rem;">
            <svg viewBox="0 0 24 24">
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <polyline points="22,4 12,13 2,4" />
            </svg>
        </div>

        <h1>Check your email</h1>
        <p class="description">
            If an account with that email exists, we've sent instructions
            to reset your password. Please check your inbox.
        </p>
    </div>

    <a href="{% url 'account_login' %}" class="btn">Back to sign in</a>
{% endblock %}
